{{ define "main" }}
<article class="single">
  <header class="single-header">
    <div class="post-meta">
      <time class="post-date">{{ .Date.Format "Jan 2, 2006" }}</time>
      <span class="dot">·</span>
      <span class="post-read">{{ math.Round (div (countwords .Content) 200.0) }} min read</span>
    </div>
    <h1 class="single-title">{{ .Title }}</h1>
    {{ with .Params.tags }}
    <div class="post-tags" style="margin-top: 0.75rem;">
      {{ range . }}<a class="post-tag" href="/tags/{{ . | urlize }}/">{{ . }}</a>{{ end }}
    </div>
    {{ end }}
  </header>

  <div class="prose">
    {{ .Content }}
  </div>

  <footer class="single-footer">
    <a href="/" class="back-link">← Back to all posts</a>
  </footer>
</article>
{{ end }}
